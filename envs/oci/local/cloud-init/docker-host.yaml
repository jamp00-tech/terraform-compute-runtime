#cloud-config

package_update: true
package_upgrade: true

packages:
  - git
  - docker

runcmd:
  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Allow opc user to run Docker
  - usermod -aG docker opc

  # Create runtime directory
  - mkdir -p /opt/app-runtime

  # Basic validation log
  - echo "Docker host initialized successfully" > /opt/app-runtime/init.log
  