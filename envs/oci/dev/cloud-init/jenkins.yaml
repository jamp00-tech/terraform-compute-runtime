#cloud-config

package_update: true
package_upgrade: true

packages:
  - git
  - docker

runcmd:
  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Allow opc user to run Docker
  - usermod -aG docker opc

  # Create Jenkins home directory
  - mkdir -p /opt/jenkins_home
  - chown -R 1000:1000 /opt/jenkins_home

  # Run Jenkins container
  - docker run -d --name jenkins --restart unless-stopped -p 8080:8080 -p 50000:50000 -v /opt/jenkins_home:/var/jenkins_home jenkins/jenkins:lts

  # Save basic init log
  - echo "Jenkins initialized with Docker" > /opt/jenkins_home/oci-init.log
  